<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable icon: safe zone is the inner 80% circle (204px radius from center 256,256).
       Background fills the full square so no clipping artifact on any shape. -->
  <defs>
    <linearGradient id="bgM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fe0ff"/>
      <stop offset="50%" stop-color="#fff1d6"/>
      <stop offset="100%" stop-color="#ffd9bd"/>
    </linearGradient>
    <linearGradient id="cupM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34D7FF"/>
      <stop offset="100%" stop-color="#FF3D97"/>
    </linearGradient>
    <linearGradient id="strawM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC95C"/>
      <stop offset="100%" stop-color="#FF8A2B"/>
    </linearGradient>
  </defs>

  <!-- Full background (no clip — maskable must bleed) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bgM)"/>

  <!-- Sun -->
  <circle cx="380" cy="120" r="48" fill="#FFC95C" opacity="0.7"/>

  <!-- Waves -->
  <path d="M0 380 Q64 358 128 380 Q192 402 256 380 Q320 358 384 380 Q448 402 512 380 L512 512 L0 512 Z"
        fill="#9fe0ff" opacity="0.45"/>
  <path d="M0 410 Q80 390 160 410 Q240 430 320 410 Q400 390 480 410 L512 430 L512 512 L0 512 Z"
        fill="#34D7FF" opacity="0.28"/>

  <!-- Cup body (all within safe zone) -->
  <path d="M196 220 L183 378 L329 378 L316 220 Z" fill="url(#cupM)"/>
  <path d="M200 224 L192 340 L220 340 L226 224 Z" fill="white" opacity="0.16"/>

  <!-- Lid -->
  <rect x="188" y="206" width="136" height="18" rx="9" fill="#163a5f" opacity="0.85"/>
  <ellipse cx="256" cy="206" rx="68" ry="9" fill="#163a5f" opacity="0.72"/>

  <!-- Straw -->
  <rect x="250" y="124" width="16" height="104" rx="8" fill="url(#strawM)"/>
  <path d="M266 154 Q288 144 286 126" stroke="#FFC95C" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- Sleeve -->
  <path d="M188 305 L185 360 L327 360 L324 305 Z" fill="#163a5f" opacity="0.16"/>

  <!-- TB -->
  <text x="256" y="300" font-family="Georgia, serif" font-weight="900" font-size="48"
        fill="white" opacity="0.85" text-anchor="middle" dominant-baseline="middle"
        letter-spacing="-2">TB</text>
</svg>
